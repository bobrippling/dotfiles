#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Rob Pilling"
email = "robpilling@gmail.com"

[ui]
#editor = ":builtin"
pager = ["less", "-FRiS"]
diff-editor = ["nvim", "$left", "$right"]
merge-editor = "diffconflicts" # can also use --tool ${merge-editor}

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
    #"-c", "let g:jj_diffconflicts_marker_length=$marker_length",
    "-c", "DiffConflicts",
    "$output"
]
merge-tool-edits-conflict-markers = true
conflict-marker-style = "git"

[aliases]
lgg = ["log", "-T", "oneline"]
logf = ["log", "-T", "builtin_log_detailed"]
logr = ["log", "-r", "heads(immutable_heads() & ::@)::@"]
log-dangling = ["log", "-r", "~ ::bookmarks() ~ ::remote_bookmarks()"]
lgf = ["lgg", "-r", "focus"]
fe = ["git", "fetch"]
tug  = ["bookmark", "move", "--from", "exactly(closest_bookmark(@-), 1)", "--to", "@"]
tug- = ["bookmark", "move", "--from", "exactly(closest_bookmark(@-), 1)", "--to", "@-"]
di = ["diff"]
grep = ["util", "exec", "--", "jj-grep"]

[revset-aliases]
'afterfork(revs)' = 'fork_point(revs)::revs'
'closest_bookmark(to)' = 'heads(::to & bookmarks())'
focus = 'descendants(trunk()..@)'
'S(substr)' = 'subject(regex-i:substr)'

[template-aliases]
oneline = '''
separate(" ",
	format_short_change_id_with_change_offset(self),
	format_short_commit_id(commit_id),
	if(self.empty(), empty_commit_marker),
	coalesce(description.first_line(), description_placeholder)
	++ surround(" ", "", self.bookmarks().join(", "))
	++ surround(" ", "", self.tags().join(", "))
	++ surround(" ", "", self.working_copies().map(|w| label("working_copy", w)).join(", ")),
	format_commit_labels(self),
) ++ "\n"
'''

[git]
private-commits = """
empty()
| description(substring-i:'wip:')
| description(substring-i:'[wip]')
| description(substring-i:'[nopush]')
| files(root-prefix-glob-i:"**/*private*")
| files(root-prefix-glob-i:"**/id_*")
| files(root-prefix-glob-i:"**/key*")
| files(root-prefix-glob-i:"**/*[^a-z]key*")
"""

[[--scope]]
--when.commands = ["status"]
[--scope.ui]
paginate = "never"

[fix.tools.rustfmt]
command = ["rustfmt", "--edition=2024"]
patterns = ["root-glob:**/*.rs"]

[fix.tools.terraform]
command = ["terraform", "fmt", "-"]
patterns = ["root-glob:**/*.tf", "root-glob:**/*.tfvars"]
