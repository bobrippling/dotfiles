#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Rob Pilling"
email = "robpilling@gmail.com"

[ui]
#editor = ":builtin"
pager = ["less", "-FRiS"]
diff-editor = ["nvim", "$left", "$right"]
merge-editor = ["nvim", "-d", "$left", "$right"]

[aliases]
lgg = ["log", "-T", "oneline"]
logf = ["log", "-T", "builtin_log_detailed"]
logr = ["log", "-r", "heads(immutable_heads() & ::@)::@"]
log-dangling = ["log", "-r", "~ ::bookmarks() ~ ::remote_bookmarks()"]
fe = ["git", "fetch"]
tug  = ["bookmark", "move", "--from", "exactly(heads(::@- & bookmarks()), 1)", "--to", "@"]
tug- = ["bookmark", "move", "--from", "exactly(heads(::@- & bookmarks()), 1)", "--to", "@-"]
di = ["diff"]
grep = ["util", "exec", "--", "jj-grep"]

# todo: template shortcuts: description.split("\n").first()
# todo: merge from dwp-m2

[template-aliases]
oneline = '''
separate(" ",
	format_short_change_id_with_change_offset(self),
	format_short_commit_id(commit_id),
	if(self.empty(), empty_commit_marker),
	coalesce(description.first_line(), description_placeholder)
	++ surround(" ", "", self.bookmarks().join(", ")),
	format_commit_labels(self),
) ++ "\n"
'''

[git]
private-commits = "description(substring-i:'wip:*')"
